# See https://rumdl.dev/
# and https://rumdl.dev/rules/
[MD013]
enabled = true
line-length = 120
code-blocks = false
tables = false

[MD060]
enabled = true
style = "aligned"

# Preserve the previous markdownlint behavior of allowing duplicate headings
# across sections while still flagging duplicates among siblings.
[no-duplicate-heading]
siblings-only = true

# Preserve the previous markdownlint behavior of requiring explicit ordered list
# numbering instead of auto-incremented `1.` markers.
[ol-prefix]
style = "ordered"

[per-file-ignores]
# These docs intentionally use inline HTML for layout that plain Markdown
# cannot express cleanly, such as dense line breaks inside config tables.
"ibm-mq-metrics/README.md" = ["MD033"]
"inferred-spans/README.md" = ["MD033"]
"maven-extension/README.md" = ["MD033"]
