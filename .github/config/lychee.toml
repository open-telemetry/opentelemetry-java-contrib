# Lychee configuration file
# See https://lychee.cli.rs/config/

timeout = 30
retry_wait_time = 5
max_retries = 6
max_concurrency = 4

# Check link anchors. Lychee 0.24+ expects a mode string here.
include_fragments = "full"

exclude = [
  # excluding links to pull requests and issues is done for performance
  "^https://github.com/open-telemetry/opentelemetry-java-contrib/(issues|pull)/\\d+$",
  # groovy-lang.org is frequently unreachable / times out
  "^https?://[^/]*groovy-lang\\.org",
]
