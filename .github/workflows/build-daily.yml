name: Build Daily

on:
  workflow_dispatch:
  schedule:
    # Run daily at 7:30 AM UTC
    - cron: '30 7 * * *'

permissions:
  contents: read

jobs:
  common:
    uses: ./.github/workflows/build-common.yml
    with:
      no-build-cache: true
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}

  lint:
    uses: ./.github/workflows/reusable-lint.yml

  publish-snapshots:
    environment: protected
    needs:
      - common
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' && github.repository == 'open-telemetry/opentelemetry-java-contrib'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up JDK for running Gradle
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build and publish snapshots
        # Disable parallel due to Sonatype's HTTP 429 rate limiting
        run: ./gradlew assemble publishToSonatype --no-parallel
        env:
          SONATYPE_USER: ${{ secrets.SONATYPE_USER }}
          SONATYPE_KEY: ${{ secrets.SONATYPE_KEY }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ github.token }}

  workflow-notification:
    permissions:
      issues: write
    if: always()
    needs:
      - common
      - lint
      - publish-snapshots
    uses: open-telemetry/shared-workflows/.github/workflows/workflow-failure-issue.yml@62d5939b47144252763c5ff9fffe8c20d76cd806 # v0.4.0
    with:
      success: >-
        ${{
          needs.common.result == 'success' &&
          needs.lint.result == 'success' &&
          needs.publish-snapshots.result == 'success'
        }}
