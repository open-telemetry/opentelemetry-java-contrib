name: Zizmor GitHub Actions Security Analysis

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
  schedule:
    - cron: '39 8 * * 2' # weekly at 08:39 UTC on Tuesday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: Zizmor Security Analysis
    permissions:
      contents: read # for actions/checkout
      security-events: write # for zizmor to upload SARIF results
    uses: open-telemetry/shared-workflows/.github/workflows/zizmor.yml@7c49790392da7de86fdb4bb968446f9cb8461eb8 # v0.3.1
